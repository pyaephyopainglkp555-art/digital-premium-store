<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>X-Premium | Secure Checkout</title>
    <style>
        body { background: #0a0a0c; color: white; font-family: sans-serif; padding: 20px; }
        .form-control { width: 100%; padding: 10px; margin: 10px 0; background: #1a1a1f; border: 1px solid #333; color: white; }
        .view-btn { width: 100%; padding: 15px; background: #00f2fe; border: none; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

    <main id="product-details">Loading...</main>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const slug = urlParams.get('slug');
        const API_URL = "https://digital-premium-store.vercel.app";

        async function init() {
            const res = await fetch(`${API_URL}/api/products/${slug}`);
            const product = await res.json();
            
            document.getElementById('product-details').innerHTML = `
                <h1>${product.name}</h1>
                <form id="order-form">
                    <input type="text" id="cust-name" class="form-control" placeholder="Name" required>
                    <input type="file" id="pay-screenshot" class="form-control" required>
                    <button type="submit" class="view-btn">Confirm Purchase</button>
                </form>
            `;

            document.getElementById('order-form').onsubmit = async (e) => {
                e.preventDefault();
                const file = document.getElementById('pay-screenshot').files[0];
                const reader = new FileReader();
                reader.onload = async (ev) => {
                    const data = { product_name: product.name, customer_name: document.getElementById('cust-name').value, screenshot: ev.target.result };
                    const response = await fetch(`${API_URL}/api/orders`, {
                        method: "POST",
                        headers: { "Content-Type": "application/json" },
                        body: JSON.stringify(data)
                    });
                    if (response.ok) alert("Order တင်ခြင်း အောင်မြင်ပါသည်။");
                    else alert("Error ဖြစ်နေပါသည်။");
                };
                reader.readAsDataURL(file);
            };
        }
        init();
    </script>
</body>
</html>
