<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>X-Premium | Product Gateway</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        .product-detail-container {
            max-width: 1000px;
            margin: 60px auto;
            padding: 20px;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 50px;
        }
        .product-visuals {
            background: rgba(20, 20, 25, 0.6);
            border: 1px solid rgba(255,255,255,0.05);
            border-radius: 16px;
            padding: 60px;
            text-align: center;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .product-visuals img {
            max-height: 200px;
            max-width: 100%;
            object-fit: contain;
            filter: drop-shadow(0 0 20px rgba(0, 242, 254, 0.3));
        }
        .product-info h1 {
            font-family: 'Orbitron', sans-serif;
            font-size: 2.5rem;
            margin-bottom: 15px;
        }
        .product-info .detail-price {
            font-family: 'Orbitron', sans-serif;
            font-size: 2rem;
            color: #00f2fe;
            margin-bottom: 30px;
            font-weight: bold;
        }
        /* Payment Section Form */
        .payment-area {
            background: #141419;
            border: 1px solid rgba(0, 242, 254, 0.1);
            padding: 25px;
            border-radius: 12px;
            margin-top: 30px;
        }
        .payment-area h3 { font-family: 'Orbitron', sans-serif; color: #4facfe; margin-bottom: 15px; }
        .payment-info-box { background: #0a0a0c; padding: 15px; border-radius: 8px; margin-bottom: 20px; border-left: 3px solid #00f2fe; }
        .payment-info-box p { font-size: 0.95rem; margin-bottom: 5px; color: #a0a0ab; }
        .payment-info-box strong { color: #fff; }
    </style>
</head>
<body>

    <header>
        <div class="logo">X-PREMIUM</div>
        <nav>
            <a href="index.html">Home</a>
            <a href="#" class="admin-btn" onclick="window.location.href='admin-login.html'">Admin Panel</a>
        </nav>
    </header>

    <main class="product-detail-container" id="product-details">
        <p class="loading" style="grid-column: 1/-1;">Establishing secure product gateway...</p>
    </main>

    <script>
        // URL ထဲက ဥပမာ (?slug=netflix) ဆိုတဲ့ Parameter ကို ဖတ်ထုတ်ခြင်း
        const urlParams = new URLSearchParams(window.location.search);
        const slug = urlParams.get('slug');
        const FETCH_SINGLE_URL = `http://digital-premium-store.vercel.app/api/products/${slug}`;

    async function loadProductDetails() {
            if (!slug) {
                window.location.href = 'index.html';
                return;
            }

            try {
                // Product ရော Payment Info ပါ API ၂ ခုလုံးဆီကနေ ပြိုင်တူ ဒေတာလှမ်းတောင်းခြင်း
                const [prodRes, payRes] = await Promise.all([
                    fetch(FETCH_SINGLE_URL),
                    fetch("http://digital-premium-store.vercel.app/api/payment-info")
                ]);

                const product = await prodRes.json();
                const payment = await payRes.json();

                const container = document.getElementById('product-details');
                
                container.innerHTML = `
                    <div class="product-visuals">
                        <img src="${product.image_url}" alt="${product.name}">
                    </div>
                    
                    <div class="product-info">
                        <h1>${product.name}</h1>
                        <div class="detail-price">${product.price.toLocaleString()} Ks</div>
                        <p style="color: #8e8e93; line-height: 1.6;">Experience absolute premium quality with unhindered bandwidth, ultra-high-definition access, and guaranteed uptime.</p>
                        
                        <div class="payment-area">
                            <h3>Secure Checkout</h3>
                            <div class="payment-info-box">
                                <p>📱 KBZ Pay - <strong>${payment.kpay_num}</strong> (${payment.kpay_name})</p>
                                <p>🌊 Wave Money - <strong>${payment.wave_num}</strong> (${payment.wave_name})</p>
                                <p>💳 Bank Transfer - <strong>${payment.bank_num}</strong> (${payment.bank_name})</p>
                            </div>
                            
                            <form id="order-form" onsubmit="handleOrderSubmit(event, '${product.name}')">
                                <div style="margin-bottom: 15px;">
                                    <input type="text" id="cust-name" class="form-control" style="background:#0a0a0c;" placeholder="Your Name / Contact Info" required>
                                </div>
                                <div style="margin-bottom: 20px;">
                                    <label style="display:block; font-size:0.85rem; color:#8e8e93; margin-bottom:8px;">Upload Payment Screenshot (Receipt)</label>
                                    <input type="file" id="pay-screenshot" accept="image/*" class="form-control" style="background:#0a0a0c; padding:6px;" required>
                                </div>
                                <button type="submit" class="view-btn">Confirm Premium Purchase</button>
                            </form>
                        </div>
                    </div>
                `;

            } catch (error) {
                document.getElementById('product-details').innerHTML = `<p class="loading" style="color:red; grid-column:1/-1;">Product not found or Server Offline.</p>`;
            }
        }

        // Order တင်လိုက်တဲ့အခါ ပတ်မယ့် ယာယီ Frontend Alert (နောက်အဆင့်မှာ Admin Dashboard နဲ့ ချိတ်ဆက်ပါမယ်)
        function handleOrderSubmit(e, productName) {
            e.preventDefault();
            const customerName = document.getElementById('cust-name').value;
            alert(`🎉 Thank you ${customerName}!\nYour order for '${productName}' has been submitted. Admin will verify your screenshot shortly.`);
            window.location.href = 'index.html';
        }

        window.onload = loadProductDetails;
    </script>
</body>
</html>
